<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <!-- NOTE: intentionally NOT standalone. iOS WebKit blocks getUserMedia in
         home-screen standalone apps (webkit.org/show_bug.cgi?id=185448), so the
         mic only works in a browser context. We launch in a browser context and
         rely on Safari's scroll-to-hide chrome (see scroll nudge below) to get
         as close to fullscreen as iPhone allows while keeping the mic working.
         Do NOT re-add apple-mobile-web-app-capable=yes — it forces standalone. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gaggenau" />
    <!-- Web app manifest: improves iOS standalone reliability (incl. mic access
         in home-screen mode) and enables a clean install on Android. -->
    <link rel="manifest" href="/manifest.json" />
    <title>Gaggenau Oven</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
